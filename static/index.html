    <script>
        let audioContext;
        let mediaStream;
        let processor;
        let socket;
        let isRecording = false;
        let hasContent = false;

        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const analyzeBtnText = document.getElementById('analyzeBtnText');
        const statusDiv = document.getElementById('status');
        const outputDiv = document.getElementById('output');
        const analysisSection = document.getElementById('analysisSection');
        const analysisContent = document.getElementById('analysis-content');
        const videoFeed = document.getElementById('videoFeed');
        const recordingTag = document.getElementById('recordingTag');
        const streamIndicator = document.getElementById('streamIndicator');

        const TARGET_SAMPLE_RATE = 16000;

        // Auto-connect viewer
        window.onload = () => {
            initWebSocket();
            // Start video feed refresh
            setInterval(updateLiveImage, 100);
        };

        function updateLiveImage() {
            if (videoFeed.style.display !== 'none') {
                videoFeed.src = "/static/live.jpg?t=" + new Date().getTime();
            }
        }

        function initWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/ws`;
            socket = new WebSocket(wsUrl);
            
            socket.onopen = () => {
                statusDiv.textContent = "已连接到服务器 (接收模式)";
                statusDiv.classList.add('text-secondary');
            };
            
            socket.onmessage = (event) => {
                const data = JSON.parse(event.data);
                handleServerMessage(data);
            };
            
            socket.onclose = () => {
                statusDiv.textContent = "连接断开";
                statusDiv.classList.remove('text-secondary');
                statusDiv.classList.add('text-error');
                setTimeout(initWebSocket, 3000); // Reconnect
            };
        }

        async function startRecording() {
            if (isRecording) return;
            try {
                // Ensure socket is open
                if (!socket || socket.readyState !== WebSocket.OPEN) {
                    initWebSocket();
                    await new Promise(r => setTimeout(r, 500));
                }

                mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: TARGET_SAMPLE_RATE });
                
                if (audioContext.state === 'suspended') await audioContext.resume();
                
                const source = audioContext.createMediaStreamSource(mediaStream);
                processor = audioContext.createScriptProcessor(2048, 1, 1);
                
                processor.onaudioprocess = (e) => {
                    if (!isRecording) return;
                    const pcmData = floatTo16BitPCM(e.inputBuffer.getChannelData(0));
                    if (socket && socket.readyState === WebSocket.OPEN) socket.send(pcmData);
                };
                
                source.connect(processor);
                processor.connect(audioContext.destination);
                
                isRecording = true;
                hasContent = false;
                outputDiv.innerHTML = "";
                analysisSection.classList.add('hidden');
                updateUI(true);
                statusDiv.textContent = "正在录制音频并实时转写...";
                statusDiv.classList.add('text-error');
            } catch (err) {
                console.error("Error starting:", err);
                alert("无法启动录音: " + err.message);
            }
        }

        function stopRecording() {
            isRecording = false;
            if (mediaStream) mediaStream.getTracks().forEach(track => track.stop());
            if (processor) processor.disconnect();
            if (audioContext) audioContext.close();
            
            updateUI(false);
            statusDiv.textContent = "录音已停止";
            statusDiv.classList.remove('text-error');
            statusDiv.classList.add('text-secondary');
            
            // Auto trigger analysis
            if (hasContent) {
                analyzeText();
            }
        }

        function floatTo16BitPCM(input) {
            const output = new Int16Array(input.length);
            for (let i = 0; i < input.length; i++) {
                const s = Math.max(-1, Math.min(1, input[i]));
                output[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
            }
            return output.buffer;
        }

        function updateUI(recording) {
            startBtn.classList.toggle('hidden', recording);
            stopBtn.classList.toggle('hidden', !recording);
            recordingTag.classList.toggle('hidden', !recording);
            streamIndicator.classList.toggle('hidden', !recording);
            
            if (recording) {
                analyzeBtn.classList.add('opacity-50', 'pointer-events-none');
            } else if (hasContent) {
                analyzeBtn.classList.remove('opacity-50', 'pointer-events-none');
            }
        }

        function handleServerMessage(data) {
            if (data.type === 'partial_result' || data.type === 'partial') {
                updatePartialText(data.text);
            } else if (data.type === 'result' || data.type === 'final') {
                hasContent = true;
                appendFinalText(data.text, data.events || data.tags || []);
                updateAnalyzeBtnState();
            } else if (data.type === 'vad') {
                statusDiv.textContent = data.status === 'speech_start' ? "正在说话..." : "静音";
            } else if (data.type === 'sys_stats') {
                updateStats(data);
            } else if (data.type === 'analysis') {
                showAnalysis(data.content);
            } else if (data.type === 'error') {
                alert(data.content);
                analyzeBtnText.textContent = "获取 AI 策略建议";
            }
        }

        function updatePartialText(text) {
            let partialEl = document.getElementById('partial-result');
            if (!partialEl) {
                partialEl = document.createElement('div');
                partialEl.id = 'partial-result';
                partialEl.className = 'text-sm italic text-on-surface-variant/60 message-animate p-3 bg-surface-container-low rounded-xl';
                outputDiv.appendChild(partialEl);
            }
            partialEl.innerHTML = `<span class="font-bold">识别中:</span> ${text}`;
            outputDiv.scrollTop = outputDiv.scrollHeight;
        }

        function appendFinalText(text, tags) {
            const partialEl = document.getElementById('partial-result');
            if (partialEl) partialEl.remove();
            
            if (!text && (!tags || tags.length === 0)) return;
            
            const div = document.createElement('div');
            div.className = 'flex flex-col gap-2 p-3 bg-white rounded-xl shadow-sm border border-surface-container-low message-animate';
            
            const tagHtml = tags.map(t => `<span class="px-2 py-0.5 bg-secondary-container/30 text-secondary text-[10px] font-bold rounded capitalize">${t.replace(/<\||\|>/g, '')}</span>`).join('');
            
            div.innerHTML = `
                <div class="flex items-center justify-between">
                    <span class="text-[10px] font-bold text-on-surface-variant/40">${new Date().toLocaleTimeString()}</span>
                    <div class="flex gap-1">${tagHtml}</div>
                </div>
                <p class="text-sm leading-relaxed">${text}</p>
            `;
            
            outputDiv.appendChild(div);
            outputDiv.scrollTop = outputDiv.scrollHeight;
        }

        function updateStats(data) {
            const info = data.model_info || {};
            if (document.getElementById('stat-device')) document.getElementById('stat-device').textContent = info.device || '-';
            if (document.getElementById('stat-model-mem')) document.getElementById('stat-model-mem').textContent = info.memory || '-';
            if (document.getElementById('stat-cpu')) document.getElementById('stat-cpu').textContent = data.cpu || '-';
            if (document.getElementById('stat-proc-mem')) document.getElementById('stat-proc-mem').textContent = data.proc_mem || '-';
        }

        function updateAnalyzeBtnState() {
            if (!isRecording && hasContent) {
                analyzeBtn.classList.remove('opacity-50', 'pointer-events-none');
            }
        }

        function analyzeText() {
            if (!socket || socket.readyState !== WebSocket.OPEN) {
                alert("连接已断开，请刷新页面。");
                return;
            }
            analyzeBtnText.textContent = "由 DeepSeek 生成建议...";
            analysisSection.classList.remove('hidden');
            analysisContent.innerHTML = "<em>正在请求 AI 专家进行智能分析...</em>";
            socket.send(JSON.stringify({ type: "analyze" }));
        }

        function showAnalysis(content) {
            analysisContent.innerHTML = marked.parse(content);
            analyzeBtnText.textContent = "分析完成";
            setTimeout(() => { analyzeBtnText.textContent = "重新获取建议"; }, 2000);
        }
    </script>
</body>
</html>
