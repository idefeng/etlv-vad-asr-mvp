<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Scholarly Observer AI - 系统登录</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
          theme: {
            extend: {
              colors: {
                "primary": "#00346f",
                "surface-container-lowest": "#ffffff",
                "background": "#f7f9fb"
              },
              fontFamily: { "headline": ["Manrope"], "body": ["Inter"] },
            },
          },
        }
    </script>
</head>
<body class="bg-background font-body flex items-center justify-center h-screen p-6">
    <div class="w-full max-w-md bg-surface-container-lowest p-10 rounded-3xl shadow-2xl">
        <div class="text-center mb-10">
            <h1 class="text-2xl font-black text-primary font-headline tracking-tighter mb-2 italic">SCHOLARLY OBSERVER</h1>
            <p class="text-sm text-slate-500 font-medium">AI 驱动的智慧教学监控中心</p>
        </div>
        <form class="space-y-6" onsubmit="event.preventDefault(); window.location.href='/dashboard';">
            <div>
                <label class="block text-xs font-bold text-slate-600 uppercase tracking-widest mb-2">管理员账号</label>
                <input type="text" class="w-full px-4 py-3 rounded-xl bg-slate-50 border-none focus:ring-2 focus:ring-primary/20 text-sm" placeholder="请输入您的用户名" value="admin">
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-600 uppercase tracking-widest mb-2">安全密码</label>
                <input type="password" class="w-full px-4 py-3 rounded-xl bg-slate-50 border-none focus:ring-2 focus:ring-primary/20 text-sm" placeholder="请输入密码" value="••••••••">
            </div>
            <div class="flex items-center justify-between px-1">
                <div class="flex items-center gap-2">
                    <input type="checkbox" id="remember" class="rounded text-primary focus:ring-primary">
                    <label for="remember" class="text-xs text-on-surface-variant cursor-pointer">记住我</label>
                </div>
                <a href="#" class="text-xs text-primary font-bold">忘记密码？</a>
            </div>
            <button type="submit" class="w-full bg-primary text-white py-4 rounded-2xl font-bold shadow-lg shadow-primary/20 hover:scale-[1.02] active:scale-95 transition-all mt-4">进入指挥中心</button>
            <div class="text-center mt-6">
                <a href="/" class="text-xs text-slate-400 hover:text-primary transition-colors flex items-center justify-center gap-2">
                    以访客身份访问实时监控 <span class="material-symbols-outlined text-[14px]">arrow_forward</span>
                </a>
            </div>
        </form>
    </div>
</body>
</html>
